services:
  postgres:
    image: postgres:16
    container_name: sbtodo-postgres
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  hbase:
    image: aristanetworks/hbase:2.4.17
    container_name: sbtodo-hbase
    command: ["/hbase/bin/hbase", "master", "start"]
    ports:
      - "16000:16000" # HBase Master RPC
      - "16010:16010" # HBase Master Web UI
      - "16020:16020" # HBase RegionServer RPC
      - "16030:16030" # HBase RegionServer Web UI
      - "2181:2181"   # ZooKeeper Client
      - "18080:8080"
      - "18085:8085"
    volumes:
      # Mount configuration
      - ./config/hbase-site.xml:/hbase/conf/hbase-site.xml
      - ./config/hbase-init.sh:/scripts/hbase-init.sh
      # Persistent Data Storage
      - hbase_data:/data/hbase
      - hbase_zookeeper:/data/zookeeper
  couchbase:
    image: couchbase:community
    container_name: sbtodo-couchbase
    ports:
      - "8091:8091"   # Web Console
      - "8092:8092"   # Views
      - "8093:8093"   # Query
      - "8094:8094"   # Search
      - "8095:8095"   # Analytics
      - "8096:8096"   # Eventing
      - "11210:11210" # Data
    volumes:
      - couchbase_data:/opt/couchbase/var
      - ./config/couchbase-init.sh:/scripts/couchbase-init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/ui/index.html"]
      interval: 10s
      timeout: 5s
      retries: 20
  tigergraph:
    image: shukla2009/tg-dev:4.2.0
    container_name: sbtodo-tigergraph
    command: start all
    ports:
      - "14240:14240" # RESTPP + GSQL endpoint
    volumes:
      - tigergraph_data:/home/tigergraph/mydata
      - ./config/tg-todo.schema.gsql:/home/tigergraph/gsql/tg-todo.schema.gsql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14240"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  hbase_data:
    driver: local
  hbase_zookeeper:
    driver: local
  couchbase_data:
    driver: local
  postgres_data:
    driver: local
  tigergraph_data:
    driver: local